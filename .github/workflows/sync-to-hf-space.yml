name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
      - gh-actions
  workflow_dispatch:

concurrency:
  group: sync-to-hf-space
  cancel-in-progress: true

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Validate required settings
        env:
          HF_SPACE_ID: ${{ vars['HF_SPACE_ID'] }}
          HF_TOKEN: ${{ secrets['HF_TOKEN'] }}
          JUDGE_API_KEY: ${{ secrets['JUDGE_API_KEY'] }}
        run: |
          if [ -z "$HF_SPACE_ID" ]; then
            echo "::error::Missing repository variable HF_SPACE_ID (format: username/space_name)."
            exit 1
          fi

          if [ -z "$HF_TOKEN" ]; then
            echo "::error::Missing repository secret HF_TOKEN."
            exit 1
          fi

          if [ -z "$JUDGE_API_KEY" ]; then
            echo "::error::Missing repository secret JUDGE_API_KEY."
            exit 1
          fi

      - name: Install Hugging Face client
        run: python -m pip install --upgrade huggingface_hub

      - name: Configure Space runtime settings
        env:
          HF_SPACE_ID: ${{ vars['HF_SPACE_ID'] }}
          HF_TOKEN: ${{ secrets['HF_TOKEN'] }}
          JUDGE_API_BASE_URL: ${{ vars['JUDGE_API_BASE_URL'] || 'https://router.huggingface.co/v1' }}
          JUDGE_MODEL: ${{ vars['JUDGE_MODEL'] || 'openai/gpt-oss-120b:novita' }}
          JUDGE_API_KEY: ${{ secrets['JUDGE_API_KEY'] }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          hf_token = os.environ["HF_TOKEN"].strip()
          space_id = os.environ["HF_SPACE_ID"].strip()
          judge_api_base_url = os.environ["JUDGE_API_BASE_URL"].strip()
          judge_model = os.environ["JUDGE_MODEL"].strip()
          judge_api_key = os.environ["JUDGE_API_KEY"].strip()

          if not hf_token:
            raise SystemExit("HF_TOKEN is empty after trimming whitespace.")
          if not space_id:
            raise SystemExit("HF_SPACE_ID is empty after trimming whitespace.")

          api = HfApi(token=hf_token)

          if not api.repo_exists(space_id, repo_type="space"):
            print(f"Space {space_id} not found. Creating Docker Space...")
            api.create_repo(
              repo_id=space_id,
              repo_type="space",
              space_sdk="docker",
              exist_ok=True,
            )
          else:
            print(f"Space {space_id} already exists.")

          api.add_space_variable(space_id, "JUDGE_API_BASE_URL", judge_api_base_url)
          api.add_space_variable(space_id, "JUDGE_MODEL", judge_model)
          api.add_space_secret(space_id, "JUDGE_API_KEY", judge_api_key)

          print(f"Runtime settings updated for {space_id}")
          PY

      - name: Push main to Hugging Face Space
        env:
          HF_SPACE_ID: ${{ vars['HF_SPACE_ID'] }}
          HF_TOKEN: ${{ secrets['HF_TOKEN'] }}
        run: |
          HF_TOKEN_CLEAN="$(printf '%s' "$HF_TOKEN" | tr -d '\r\n')"
          HF_SPACE_ID_CLEAN="$(printf '%s' "$HF_SPACE_ID" | tr -d '\r\n')"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add space "https://oauth2:${HF_TOKEN_CLEAN}@huggingface.co/spaces/${HF_SPACE_ID_CLEAN}"
          # Keep the Space as an exact mirror of this repository's main branch.
          git push --force space HEAD:main
